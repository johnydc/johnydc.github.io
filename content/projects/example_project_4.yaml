title: "Using SQL to Answer Stakeholder Questions"

short_summary: >
  This project was completed within the CMSE492 course at Michigan State University. The project 
  involved connecting to a Dockerized MySQL database from a local Jupyter Notebook, executing SQL 
  queries to extract insights. The notebook goes into detail, step by step, on the thought process 
  behind each SQL query and the insights gained from the results. Also included in the notebook,
  are validation checks to ensure the accuracy of the SQL queries and the results obtained. The
  project highlights how you can leverage existing data, in a structured and reliable manner, to 
  answer significant business questions and make informed decisions.

tech_stack:
  - Docker
  - sqlalchemy
  - Jupyter Notebooks
  - Python
  - pandas

problem_statement: >
  The project question that I explored was “Which actors appear in the films that generate the 
  highest total revenue?” This question was formulated under the conditions that the company was 
  seeking a partnership with a well-known actor or actress to provide new and existing customers 
  with a promotion. While it may be easy to search elsewhere for metrics and data on who may be the 
  best partner for the company, this project shows how you can investigate the data you already 
  collected to identify underlying trends.

approach: >
  The project was divided into separate workflows, with all workflows joining together to make one 
  cohesive project answering the proposed question. The first part included joining all of the 
  necessary tables together. Since there were multiple tables that needed to be joined together, I 
  created a CTE query that performed all of the necessary JOINs to improve the readability of future 
  queries. Once I had a table with all of the columns I needed for the analysis, I grouped the table 
  on the actors present in the database, so each row would represent one individual actor and their 
  respective data. Included in this portion was filtering the table with minimum requirements for the 
  prospective partner. Lastly, I performed a window function across the table that ranked the actors 
  on how many movies in our database they acted in and the generated revenue of those movies. An 
  additional column was added, averaging these two ranks to create a new summary ranking.

results_impact: >
  The end result of the project was a table that ranked actors based on the number of movies they acted 
  in and the total revenue generated by those movies. The top-ranked actors were identified as potential 
  partners for the company’s promotion. This analysis provided actionable insights for the company, 
  allowing them to make informed decisions about which actors to approach for partnerships, ultimately 
  aiming to increase customer engagement and drive sales through targeted promotions. Additionally, while
  the results from this project may not be directly applicable to the selection process for the company’s 
  promotion, the project serves as a demonstration of how to leverage existing data to narrow down 
  potential options and gain insights that can be used to make informed decisions.

